# Snapshot filter — what to keep when stripping Cadence Maestro XML
# files for snapshot output.  Acts as both *config* and *documentation*:
# every Cadence element we know about is listed below.  Items in
# `keep:` lists are kept in the filtered output.  Items in `drop:` lists
# are documented for reference but excluded from the filter — uncomment
# them under `keep:` if you want them included.
#
# Two files are filtered (raw copies kept under their Cadence names):
#   * maestro.sdb     →  state_from_sdb.xml
#   * active.state    →  state_from_active_state.xml
#
# This file is loaded once per snapshot.  Edit and re-run snapshot to
# change the filter behavior — no code changes required.

# ---------------------------------------------------------------------------
# maestro.sdb
# ---------------------------------------------------------------------------
# Top level:  <setupdb> contains <active> and many <history> snapshots.
# History snapshots are full duplicates of <active> at past run times —
# ~90% of total file bytes.  They are never kept; only <active> matters.
#
# Inside <active>, these direct children are known to Cadence.  Most are
# GUI prefs / view state with no setup intent.  The defaults below keep
# the high-signal ~10%.

maestro_sdb:
  active_keep:
    # The actual setup — what will run, with what knobs.
    - currentmode            # run mode (Single Run / Sweeps and Corners / ...)
    - jobcontrolmode         # LSCS / Local / ...
    - corners                # PVT corners (with vars / temperature / models)
    - tests                  # per-test setup (tooloptions / vars / outputs)
    - vars                   # global design variables
    - parameters             # per-instance CDF overrides
    - specs                  # design spec targets / limits
    - parametersets          # named parameter sweep sets
    - overwritehistoryname   # next-run history name

  active_drop:
    # GUI / view-state — uncomment under active_keep to include.
    # - plottingoptions       # waveform plot prefs
    # - outputscustomcols     # output table column layout
    # - runoptions            # GUI run-button prefs
    # - extensions            # ADE Assembler extensions toggles
    # - exploreroptions       # ADE Explorer toggles
    # - checksasserts         # checks/asserts toggle state
    # - incrementalsim        # incremental sim cache state
    # - incrementalsimcache   # ditto
    # - resultscustomcols     # results table column layout
    # - waveforms             # last-shown waveform list
    # - viewoptions           # tree view prefs

# ---------------------------------------------------------------------------
# active.state
# ---------------------------------------------------------------------------
# Top level:  <statedb> contains one or more <Test Name="..."> blocks.
# Inside each <Test>, components carry per-test state.  Most components
# exist on every test even when empty — they are placeholder containers
# that the GUI populates when used.
#
# The defaults keep the ones that hold actual setup; the rest are listed
# under components_drop with one-line descriptions for reference.

active_state:
  components_keep:
    # Identity + design pointer
    - adeInfo                 # designInfo + projectDir + description
    # The full per-analysis sim setup — the bulk of useful state lives here.
    - analyses                # <analysis Name="pss|pnoise|tran|ac|dc|noise|sp|stb">
    # Per-test design knobs
    - variables               # per-test vars (sdb has globals too)
    - outputs                 # per-test output definitions
    - modelSetup              # model file selection
    - environmentOptions      # asiEnv key/value pairs
    - rfstim                  # RF stimulus (PSS large-signal sources)
    # Simulator engine selection — the Spectre X accuracy preset
    # (AX / CX / MX) and APS-vs-Spectre-X choice live here.
    - turboOptions            # uniMode / spectreXAccuracyScale / mtOption / ...
    # Optional per-test setups — populated only when the user uses these
    # features, but high-signal when populated.
    - mdlOptions              # MDL measurement testbench cell ref
    - mtsSetup                # multi-technology simulation
    - graphicalStimuli        # GUI-drawn stimulus waveforms

  components_drop:
    # Pure GUI defaults across all observed cells (verified against
    # 5 example_artifacts cells — 0 fields vary).  Uncomment under
    # ``components_keep`` if you need them.
    # - simulatorOptions       # spectre options (temp/reltol/...) — 151/152
    #                          # fields are GUI defaults; uncomment to
    #                          # capture user overrides of temp / tnom / etc.
    # - convergence            # convergence aids (gmin/homotopy/...)
    # - cosimOptions           # AMS / mixed-signal cosim
    # - devCheckingSetup       # device-checking / DC op-point check
    # - emirOptions            # EMIR (electromigration / IR drop)
    # - faultRules             # fault-injection rules
    # - faults                 # specific fault definitions
    # - opPoints               # operating-point save list
    # - otherInfo              # misc GUI scratch
    # - paramSetup             # parametric-analysis setup (sdb covers this)
    # - relxOptions            # RelXpert / reliability sim
    # - simulationFiles        # extra include / stim files
    # - subckts                # subckt overrides
